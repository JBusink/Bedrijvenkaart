<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bedrijvenkaart Technische Natuurkunde</title>

  <link rel="stylesheet" href="css/style.css">

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
  />
  <link rel="stylesheet" href="css/style.css">  
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">

    <button id="darkToggle" class="dark-toggle">🌙</button>

    <div class="topbar-text">
      <h1>Bedrijvenkaart Technische Natuurkunde</h1>
      <p>Zoek stagebedrijven en onderzoeksinstituten</p>
    </div>

    <nav class="page-tabs">
      <a href="index.html" class="tab-button active">🗺️ Kaart</a>
      <a href="lijst.html" class="tab-button"> 📋 Lijst</a>
      <a href="stage.html" class="tab-button">ℹ️ Stage-informatie</a>
    </nav>

  </div>
</header>

<div id="kaartView">

  <section class="hero-filters">
    <div class="hero-filters-inner">
      <div class="filter-group">
        <label for="typeFilter">Type organisatie</label>
        <select id="typeFilter">
          <option value="alles">Alles</option>
          <option value="bedrijf">Bedrijf</option>
          <option value="onderzoek">Onderzoek</option>
        </select>
      </div>

<div class="filter-group filter-group-tags">
  <label>Keywords</label>

  <div class="tag-filter-row">
    <div class="filter-actions">
      <button id="resetFilters" type="button">Reset filters</button>
    </div>

    <div id="tagFilter" class="tag-filter-list">
      <!-- Wordt dynamisch gevuld -->
    </div>
  </div>
</div>
  </section>

  <main class="content-layout">
    <div class="map-wrapper">
      <div id="map"></div>
    </div>

    <aside class="sidepanel" id="sidepanel">
      <div class="sidepanel-placeholder">
        <h2>Bedrijfsinformatie</h2>
        <p>Klik op een marker om uitgebreide informatie te bekijken.</p>
      </div>
    </aside>
  </main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="js/main.js"></script>

</body>
</html>
