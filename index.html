<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bedrijvenkaart Technische Natuurkunde</title>

  <!-- Eigen CSS -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- MarkerCluster -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
  />
</head>

<body>

  <!-- HEADER -->
  <header class="topbar">
    <div>
      <h1>Bedrijvenkaart Technische Natuurkunde</h1>
      <p>Zoek stagebedrijven en onderzoeksinstituten</p>
    </div>
  </header>

  <nav class="page-tabs">
  <a href="index.html" class="tab-button active">🗺️ Kaart</a>
  <a href="stage.html" class="tab-button">ℹ️ Stage-informatie</a>
</nav>

  <!-- NAV TABS -->
  <!-- <nav class="page-tabs">
    <button id="showMapBtn" class="tab-button active" type="button">
      🗺️ Kaart
    </button>
    <button id="showInfoBtn" class="tab-button" type="button">
      ℹ️ Stage-informatie
    </button>
  </nav> -->

  <!-- ========================= -->
  <!-- KAART VIEW -->
  <!-- ========================= -->

  <div id="kaartView">

    <!-- FILTERS -->
    <section class="filter-panel">

      <div class="filter-group">
        <label for="typeFilter">Type organisatie</label>
        <select id="typeFilter">
          <option value="alles">Alles</option>
          <option value="bedrijf">Bedrijf</option>
          <option value="onderzoek">Onderzoek</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="onderwerpFilter">Onderwerp</label>
        <select id="onderwerpFilter">
          <option value="alles">Alles</option>
          <option value="high-tech systemen">High-tech systemen</option>
          <option value="mechatronica">Mechatronica</option>
          <option value="optica/fotonica">Optica/fotonica</option>
          <option value="materialen">Materialen</option>
          <option value="energie">Energie</option>
          <option value="medische technologie">Medische technologie</option>
          <option value="data/modelleren">Data/modelleren</option>
          <option value="metingen en sensoren">Metingen en sensoren</option>
        </select>
      </div>

      <div class="filter-actions">
        <button id="resetFilters" type="button">
          Reset filters
        </button>
      </div>

    </section>

    <!-- KAART + SIDEPANEL -->
    <main class="content-layout">

      <div class="map-wrapper">
        <div id="map"></div>
      </div>

      <aside class="sidepanel" id="sidepanel">
        <div class="sidepanel-placeholder">
          <h2>Bedrijfsinformatie</h2>
          <p>Klik op een marker om uitgebreide informatie te bekijken.</p>
        </div>
      </aside>

    </main>

  </div>

  <!-- ========================= -->
  <!-- INFO VIEW -->
  <!-- ========================= -->

  

  <!-- SCRIPTS -->

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
