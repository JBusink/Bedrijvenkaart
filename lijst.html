<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stagebedrijven per domein - Technische Natuurkunde</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="topbar">
    <div class="topbar-inner">

      <button id="darkToggle" class="dark-toggle" type="button" aria-label="Toggle dark mode">
        <img src="images/icons/darkmode.svg" alt="Toggle dark mode" width="30" height="30">
      </button>

      <div class="topbar-text">
        <h1>Stage-informatie Technische Natuurkunde</h1>
        <p>Algemene informatie over het zoeken en uitvoeren van een stage</p>
      </div>

      <nav class="page-tabs">
        <a href="index.html" class="tab-button">
          <img src="images/icons/information.svg" class="tab-icon" alt="" width="30" height="30">
          <span>Info</span>
        </a>
        <a href="map.html" class="tab-button">
          <img src="images/icons/map.svg" class="tab-icon" alt="" width="30" height="30">
          <span>Kaart</span>
        </a>
        <a href="lijst.html" class="tab-button active">
          <img src="images/icons/list.svg" class="tab-icon" alt="" width="30" height="30">
          <span>Lijst</span>
        </a>
      </nav>

    </div>
  </header>


  <main class="info-page">
    <section class="info-card search-card">
      <div class="search-header">
        <h2>Zoeken</h2>
        <p>Zoek op naam, plaats, provincie, beschrijving, type of domein.</p>
      </div>
      <div class="search-row">
        <input
          type="text"
          id="zoekInput"
          class="search-input"
          placeholder="Bijvoorbeeld: Amsterdam, fotonica, energie..."
          autocomplete="off"
        >

        <select id="provincieFilter" class="search-select">
          <option value="">Alle provincies</option>
        </select>

        <button id="resetZoekopdracht" class="search-reset-button" type="button">
          Wissen
        </button>
      </div>
    </section>

    <section id="zoekStatus" class="search-status" aria-live="polite"></section>
    <section id="domeinLijst" class="accordion"></section>
  </main>

<footer>
  <div class="footer-section">
    <h3>Feedback</h3>
    <p>
      Mis je een bedrijf of klopt er iets niet?
      Laat het weten via <a href="mailto:j.busink@hva.nl">Neem contact op</a>.
    </p>
  </div>
</footer>
<script src="js/lijst.js"></script>
<script src="js/theme.js"></script>

</body>
</html>
